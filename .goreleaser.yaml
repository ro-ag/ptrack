version: 2

project_name: ptrack

before:
  hooks:
    - go mod tidy

builds:
  - id: ptrack
    main: .
    binary: ptrack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/ro-ag/ptrack/internal/cli.Version={{ .Version }}

archives:
  - id: ptrack
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: ro-ag
    name: ptrack
